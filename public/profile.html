<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人资料</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 360px;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #07c160;
      margin-bottom: 16px;
    }
    .nickname {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .openid {
      font-size: 11px;
      color: #bbb;
      margin-bottom: 24px;
      word-break: break-all;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    .info-item {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
    }
    .info-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .btn-logout {
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #ff4d4f; color: #ff4d4f; }
    .loading { color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card" id="content">
    <p class="loading">加载中...</p>
  </div>

  <script>
    const SEX_MAP = { 0: '未知', 1: '男', 2: '女' };

    fetch('/api/user')
      .then(r => r.json())
      .then(({ user }) => {
        const location = [user.country, user.province, user.city].filter(Boolean).join(' · ');
        document.getElementById('content').innerHTML = `
          <img class="avatar" src="${user.avatar || 'https://via.placeholder.com/80'}" alt="头像">
          <div class="nickname">${escHtml(user.nickname || '微信用户')}</div>
          <div class="openid">OpenID: ${escHtml(user.openid)}</div>
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">性别</div>
              <div class="info-value">${SEX_MAP[user.sex] || '未知'}</div>
            </div>
            <div class="info-item">
              <div class="info-label">地区</div>
              <div class="info-value">${escHtml(location || '—')}</div>
            </div>
          </div>
          <button class="btn-logout" onclick="logout()">退出登录</button>
        `;
      })
      .catch(() => {
        window.location.href = '/';
      });

    function logout() {
      fetch('/auth/logout', { method: 'POST' })
        .then(() => { window.location.href = '/'; });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
