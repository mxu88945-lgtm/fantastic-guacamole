<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Role Chat" />
<meta name="theme-color" content="#f5f4ef" />
<script>
/* Pre-paint theme priming */
(function () {
  try {
    var bg = localStorage.getItem("jyc_themebg");
    var dark = localStorage.getItem("jyc_themedark");
    if (dark === "1" || dark === "0")
      document.documentElement.setAttribute("data-theme", dark === "1" ? "dark" : "light");
    if (bg) {
      document.documentElement.style.setProperty("--bg", bg);
      var themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) themeMeta.setAttribute("content", bg);
    }
    var preCollapsed = window.innerWidth <= 720;
    if (!preCollapsed) {
      var s = JSON.parse(localStorage.getItem("jyc_settings") || "{}");
      preCollapsed = !!s.sidebarCollapsed;
    }
    if (preCollapsed) document.documentElement.classList.add("sb-pre-collapsed");
  } catch (e) {}
})();
</script>
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=83" />

<title>Role Chat</title>
<style>
  :root, html[data-theme="dark"] {
    --bg: #0f1117;
    --bg-soft: #161924;
    --bg-panel: #1b1f2e;
    --border: #2a3042;
    --text: #e6e8ef;
    --text-dim: #9aa3b8;
    --accent: #7c83ff;
    --accent-soft: #2e3358;
    --user-bubble: #2a3358;
    --assistant-bubble: #1b1f2e;
    --code-bg: #0c0e15;
    --danger: #ff6b6b;
    --err-bg: #3a1f24;
    --err-text: #ffb4b4;
    --hover: #20243400;
    --item-active: #232844;
    --radius: 14px;
    --control: #111111;
    --control-text: #ffffff;
    --control-border: #f2f2f2;
  }
  html[data-theme="light"] {
    --bg: #f5f6fa;
    --bg-soft: #ffffff;
    --bg-panel: #eef0f6;
    --border: #dde1ea;
    --text: #1b1f2e;
    --text-dim: #6b7388;
    --accent: #5d63e6;
    --accent-soft: #dfe1fb;
    --user-bubble: #e6e8ff;
    --assistant-bubble: #ffffff;
    --code-bg: #f0f2f8;
    --danger: #e0484d;
    --err-bg: #fdecec;
    --err-text: #b3343a;
    --item-active: #e9ebf7;
    --radius: 14px;
    --control: #111111;
    --control-text: #ffffff;
    --control-border: #111111;
  }
  * { box-sizing: border-box; }
  html { height: 100%; background: var(--app-gradient, var(--bg)); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    background: var(--app-gradient, var(--bg));
    color: var(--text);
    background-attachment: fixed;
    min-height: 100%;
    margin: 0;
    position: fixed; inset: 0; height: 100%;
    overflow: hidden; overscroll-behavior: none;
  }
  .app { display: flex; height: 100%; }

  /* Sidebar */
  .sidebar {
    width: 250px; flex-shrink: 0;
    background: var(--bg-soft);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: margin-left .2s ease;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .sidebar.collapsed { margin-left: -250px; }
  html.sb-pre-collapsed .sidebar { margin-left: -250px; }
  .sidebar .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 10px 12px 16px; border-bottom: 1px solid var(--border);
  }
  .brand-role-picker {
    position: relative; flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px;
    cursor: pointer;
  }
  .brand-role-picker .role-chevron { width: 16px; height: 16px; flex: 0 0 auto; color: var(--text-dim); }
  .brand-role-picker .role-quick {
    position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0;
    cursor: pointer; appearance: auto;
  }
  .sidebar .brand .logo {
    width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
    background: linear-gradient(135deg, #7c83ff, #b06bff);
    display: grid; place-items: center; font-weight: 700; color: #fff;
  }
  .sidebar .brand .logo img { width: 100%; height: 100%; object-fit: cover; }
  .sidebar .brand .title {
    font-size: 14px; font-weight: 600;
    flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sidebar .brand .icon-btn {
    width: 34px; height: 34px; padding: 0; border-radius: 50%;
    background: transparent; border: none; color: var(--text-dim);
    display: grid; place-items: center; flex-shrink: 0; cursor: pointer; transition: .15s;
  }
  .sidebar .brand .icon-btn svg { width: 19px; height: 19px; }
  .sidebar .brand .icon-btn:hover, .sidebar .brand .icon-btn:active { background: var(--item-active); color: var(--text); }
  .conv-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .search-result { padding: 9px 10px; border-radius: 9px; cursor: pointer; margin-bottom: 4px; }
  .search-result:active, .search-result.active { background: var(--item-active); }
  .search-result .sr-title { font-size: 11px; color: var(--accent); margin-bottom: 2px; }
  .search-result .sr-snip { font-size: 12.5px; color: var(--text); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .search-result .sr-snip mark { background: var(--accent); color: #fff; border-radius: 3px; padding: 0 2px; }
  .msg.flash .bubble, .remind-card.flash { animation: flashmsg 1.6s ease; }
  @keyframes flashmsg { 0%,100% { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    20%,60% { box-shadow: 0 0 0 3px var(--accent); } }
  .msg .bubble.summary { border-style: dashed; opacity: .92; }
  .conv-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 10px; border-radius: 9px; cursor: pointer;
    font-size: 13px; color: var(--text-dim); margin-bottom: 2px;
  }
  .conv-item.active { background: var(--item-active); color: var(--text); }
  .conv-item .ic { flex-shrink: 0; opacity: .7; }
  .conv-item .name {
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-group-label {
    padding: 14px 10px 6px; color: var(--text-dim); font-size: 10px; font-weight: 650;
    letter-spacing: .35px;
  }
  .conv-copy { flex: 1; min-width: 0; }
  .conv-copy .name { display: block; color: inherit; }
  .conv-copy .snippet {
    display: block; margin-top: 2px; color: var(--text-dim); font-size: 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: .78;
  }
  .conv-item .act {
    opacity: .5; border: none; background: none; color: var(--text-dim);
    cursor: pointer; font-size: 13px; padding: 0 2px; flex-shrink: 0;
  }
  @media (hover: hover) {
    .sidebar-action-bubble:hover { transform: translateY(-1px); box-shadow: 0 10px 26px rgba(0,0,0,.14); }
    .conv-item:hover { background: var(--item-active); color: var(--text); }
    .conv-item .act { opacity: 0; }
    .conv-item:hover .act { opacity: .6; }
    .conv-item .act:hover { opacity: 1; color: var(--accent); }
    .conv-item .act.del:hover { color: var(--danger); }
  }
  .sidebar .brand #sidebar-settings-btn { display: none; }
  .sidebar-footer-actions {
    display: flex; align-items: center; justify-content: space-between; flex: 0 0 auto;
    padding: 8px 14px 10px;
  }
  .sidebar-action-bubble {
    position: relative; width: 54px; height: 54px; margin: 0; padding: 0;
    border: 1px solid var(--border); border-radius: 50%; flex: 0 0 auto;
    background: var(--bg-panel); color: var(--text); cursor: pointer;
    display: grid; place-items: center; transition: transform .16s, box-shadow .16s;
    box-shadow: 0 8px 22px rgba(0,0,0,.12);
  }
  .sidebar-action-bubble:active { transform: scale(.95); }
  .sidebar-action-bubble > svg { width: 24px; height: 24px; }
  html[data-glass="1"] .sidebar-action-bubble { background: rgba(255,255,255,.5); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
  .side-entry {
    margin: 8px 12px 0; padding: 9px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg-panel);
    color: var(--text); cursor: pointer; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 7px; transition: .15s; text-align: left;
  }
  .side-entry:hover { border-color: var(--accent); }
  .cycle-status { border:1px solid var(--border); border-radius:14px; padding:16px; background:var(--bg-panel); }
  .cycle-big { font-size:30px; font-weight:800; line-height:1.1; }
  .cycle-log-btn {
    width:100%; padding:14px; border:none; border-radius:14px; cursor:pointer;
    font-size:15px; font-weight:700; color:#fff; background:var(--accent); transition:.15s;
  }
  .cycle-log-btn.end { background:var(--text-dim); }
  .cycle-cal { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .cycle-cal .h { font-size:11px; color:var(--text-dim); text-align:center; padding:3px 0; }
  .cycle-cal .d {
    aspect-ratio:1; display:grid; place-items:center; border-radius:50%;
    font-size:13px; color:var(--text); position:relative; cursor:pointer;
  }
  .cycle-cal .d.empty { cursor:default; }
  .cycle-cal .d.today { outline:2px solid var(--accent); }
  .cycle-cal .d.period { background:var(--accent); color:#fff; }
  .cycle-cal .d.predict { background:var(--accent-soft); color:var(--text); border:1px dashed var(--accent); }
  .cycle-cal .d.ovu { background:transparent; box-shadow:inset 0 0 0 2px #6fae8d55; }
  .cycle-legend { display:flex; gap:14px; font-size:11px; color:var(--text-dim); flex-wrap:wrap; }
  .cycle-legend i { width:11px; height:11px; border-radius:50%; display:inline-block; vertical-align:-1px; margin-right:4px; }
  .cycle-hist-row { display:flex; align-items:center; gap:8px; font-size:13px; padding:7px 0; border-top:1px solid var(--border); }
  .mem-row { display:flex; align-items:center; gap:6px; padding:6px 8px; border:1px solid var(--border); border-radius:9px; background:var(--bg-panel); }
  .mem-row.core { border-color:var(--accent); }
  .mem-star { background:none; border:none; cursor:pointer; font-size:15px; line-height:1; padding:2px; flex-shrink:0; }
  .mem-text { flex:1; min-width:0; font-size:13px; line-height:1.4; cursor:text; word-break:break-word; }
  .mem-del { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:13px; padding:2px 4px; flex-shrink:0; }
  .mem-del:hover { color:var(--err-text); }
  .memory-api-grid { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:8px; margin-top:10px; }
  .memory-api-grid .field { padding:0; }
  .memory-api-badge { display:inline-flex; align-items:center; gap:6px; color:var(--text-dim); font-size:11px; }
  .memory-api-badge::before { content:""; width:7px; height:7px; border-radius:50%; background:#56c596; }
  @media (max-width: 560px) { .memory-api-grid { grid-template-columns:1fr; } }
  .card-fold { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:14px; padding:2px 6px; flex-shrink:0; line-height:1; }
  .card-fold:hover { color:var(--text); }

  /* Main column */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
  #chat-bg {
    position: absolute; inset: 0; z-index: 0; pointer-events: none; display: none;
    background-size: cover; background-position: center; transform: scale(1.12);
  }
  .main > .chat, .main > .composer-wrap { position: relative; z-index: 1; }
  .main > .chat { background: transparent; }
  .main > header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    background: color-mix(in srgb, var(--bg) 8%, transparent);
    backdrop-filter: blur(20px) saturate(1.15);
    -webkit-backdrop-filter: blur(20px) saturate(1.15);
  }
  .main > .chat { padding-top: calc(58px + env(safe-area-inset-top)); }
  .main > .composer-wrap { background: linear-gradient(to bottom, transparent 0%, var(--grad-bottom, var(--bg)) 62%); }

  /* Header */
  header {
    position: relative; z-index: 5;
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px; background: transparent;
    padding-top: calc(11px + env(safe-area-inset-top));
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header .sub { font-size: 11px; color: var(--text-dim); }
  header .spacer { flex: 1; }
  .header-identity { min-width: 0; display: flex; align-items: center; }
  .header-role-name { max-width: 230px; color: var(--text); font-size: 14px; font-weight: 650;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .icon-btn {
    background: var(--bg-panel); border: 1px solid var(--border);
    color: var(--text); border-radius: 9px; padding: 7px 11px;
    font-size: 13px; cursor: pointer; transition: .15s;
  }
  .icon-btn:hover { border-color: var(--accent); }
  header .icon-btn {
    width: 36px; height: 36px; padding: 0; border-radius: 50%;
    background: transparent; border: none; color: var(--text-dim);
    display: grid; place-items: center; flex-shrink: 0; transition: .15s;
  }
  header .icon-btn svg { width: 21px; height: 21px; }
  header .icon-btn:hover, header .icon-btn:active { background: var(--item-active); color: var(--text); }
  .header-menu {
    position: absolute; top: calc(100% - 4px); right: 10px; z-index: 60;
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 13px;
    box-shadow: 0 10px 30px rgba(0,0,0,.18); padding: 6px; min-width: 170px;
    display: none; flex-direction: column;
  }
  .header-menu.show { display: flex; }
  .header-menu button {
    background: none; border: none; color: var(--text); text-align: left; font-size: 14px;
    padding: 10px 12px; border-radius: 9px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  }
  .header-menu button svg { width: 17px; height: 17px; flex-shrink: 0; color: var(--text-dim); }
  .header-menu button:hover { background: var(--item-active); }
  .header-menu button.danger, .header-menu button.danger svg { color: var(--danger); }
  .model-quick {
    background: var(--bg-panel); border: 1px solid transparent;
    color: var(--text); border-radius: 999px; padding: 7px 13px;
    font-size: 12px; cursor: pointer; max-width: 200px;
    -webkit-appearance: none; appearance: none;
    text-align: center;
  }
  .model-quick:focus { outline: none; border-color: var(--accent); }
  html[data-glass="1"] .model-quick { background: rgba(255,255,255,.42); border-color: rgba(255,255,255,.5); }

  /* Settings */
  .settings {
    position: fixed; inset: 0; z-index: 60; background: var(--bg);
    display: none; flex-direction: column;
  }
  .settings.open { display: flex; }
  .settings-header {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 14px 16px; padding-top: calc(14px + env(safe-area-inset-top));
    border-bottom: 1px solid var(--border); background: var(--bg-soft);
    font-weight: 700; font-size: 16px; flex-shrink: 0;
  }
  .settings-header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .settings-back {
    width: 36px; height: 36px; border: none; border-radius: 50%; padding: 0;
    background: var(--bg-panel); color: var(--text); cursor: pointer; display: none; place-items: center;
  }
  .settings-back svg { width: 19px; height: 19px; }
  .settings-close-btn {
    width: 44px; height: 44px; flex: 0 0 44px; border: 1px solid var(--border);
    border-radius: 50%; padding: 0; background: var(--bg-panel); color: var(--text);
    cursor: pointer; display: grid; place-items: center; box-shadow: 0 4px 14px rgba(0,0,0,.06);
  }
  .settings-close-btn svg { width: 23px; height: 23px; }
  .settings-close-btn:active { transform: scale(.96); }
  .model-current-head {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .model-fetch-status { color: var(--text-dim); font-size: 11px; }
  .model-fetch-status:empty { display: none; }
  .model-fetch-btn {
    min-height: 38px; flex: 0 0 auto; border: 0; border-radius: 999px; padding: 0 15px;
    background: var(--control); color: var(--control-text); cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px; font: 600 13px/1 inherit;
  }
  .model-fetch-btn svg { width: 16px; height: 16px; }
  .model-fetch-btn:disabled { opacity: .55; cursor: wait; }
  .settings-shell {
    flex: 1; min-height: 0; width: min(760px, 100%); margin: 0 auto; overflow: hidden;
  }
  .settings-nav {
    height: 100%; padding: 24px clamp(16px, 5vw, 38px) calc(28px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 0; overflow-y: auto;
  }
  .settings-nav-title { padding: 4px 4px 14px; font-size: 13px; font-weight: 650; color: var(--text-dim); }
  .settings-nav button {
    width: 100%; min-height: 58px; border: 1px solid var(--border); border-bottom: none; border-radius: 0; padding: 0 16px;
    background: var(--bg-soft); color: var(--text); cursor: pointer;
    font-family: inherit; font-size: 15px; font-weight: 500; line-height: 1;
    display: flex; align-items: center; gap: 10px; text-align: left;
  }
  .settings-nav button:first-of-type { border-radius: 16px 16px 0 0; }
  .settings-nav button:last-of-type { border-bottom: 1px solid var(--border); border-radius: 0 0 16px 16px; }
  .settings-nav button:hover, .settings-nav button:active { background: var(--item-active); }
  .settings-nav button.active { background: var(--bg-soft); }
  .settings-nav button span:first-child { width: 24px; text-align: center; font-size: 18px; }
  .settings-chevron { margin-left: auto; width: auto !important; color: var(--text-dim); font-size: 22px !important; font-weight: 300; }
  .settings-inner {
    min-width: 0; height: 100%; overflow-y: auto; padding: 24px clamp(16px, 4vw, 42px);
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    display: none; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px;
    align-content: start;
  }
  .settings-shell.subpage .settings-nav { display: none; }
  .settings-shell.subpage .settings-inner { display: grid; }
  .settings-inner > [data-settings-group][hidden] { display: none !important; }
  .settings-page-intro {
    grid-column: 1 / -1; margin-bottom: 6px; padding-bottom: 18px; border-bottom: 1px solid var(--border);
  }
  .settings-page-intro h2 { margin: 0 0 5px; font-size: 22px; letter-spacing: -.3px; }
  .settings-page-intro p { margin: 0; color: var(--text-dim); font-size: 12px; line-height: 1.55; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--text-dim); }
  .field input, .field select, .field textarea {
    background: var(--bg-panel); border: 1px solid var(--border);
    color: var(--text); border-radius: 11px; padding: 11px 13px;
    font-size: 13px; font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .field textarea { resize: vertical; min-height: 38px; }
  .pw-wrap { position: relative; }
  .pw-wrap input { width: 100%; padding-right: 40px; }
  .pw-eye { position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 16px; line-height: 1;
    padding: 6px; opacity: .7; }
  .pw-eye:hover { opacity: 1; }
  .field .row { display: flex; align-items: center; gap: 8px; }
  .field .row input[type="range"] { flex: 1; }
  .field .hint { font-size: 11px; color: var(--text-dim); }
  .section-title {
    grid-column: 1 / -1; font-size: 14px; font-weight: 600; color: var(--text);
    margin: 4px 0 2px; display: flex; align-items: center; gap: 6px;
  }
  .section-title:first-child { border-top: none; padding-top: 0; }
  .section-icon { width: 16px; height: 16px; flex-shrink: 0; }
  .section-title.accordion {
    cursor: pointer; user-select: none; margin: 0;
    background: var(--bg-soft); border: 1px solid var(--border);
    border-radius: 13px; padding: 13px 15px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .settings-inner > .field[data-settings-group] {
    background: var(--bg-soft); border: 1px solid var(--border) !important;
    border-radius: 15px !important; padding: 16px !important;
  }
  .section-title.accordion:active { background: var(--item-active); }
  .acc-chev { margin-left: auto; transition: transform .2s; font-size: 12px; opacity: .55; }
  .section-title.collapsed .acc-chev { transform: rotate(-90deg); }
  .mini-btn {
    background: var(--bg-panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .mini-btn:hover { border-color: var(--accent); }
  .mini-btn.primary { background: var(--control); color: var(--control-text); border-color: var(--control-border); }
  .avatar-preview {
    width: 40px; height: 40px; border-radius: 9px; flex-shrink: 0;
    display: grid; place-items: center; font-weight: 700; font-size: 15px;
    background: linear-gradient(135deg,#7c83ff,#b06bff); color: #fff; overflow: hidden;
  }
  .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

  /* Reminder card */
  .msg.reminder { display: block; max-width: 600px; margin: 4px auto 10px; padding: 0; }
  .remind-card {
    background: var(--bg-soft); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 16px; box-shadow: 0 4px 16px rgba(0,0,0,.07);
  }
  html[data-glass="1"] .remind-card {
    background: rgba(255,255,255,.34); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-color: rgba(255,255,255,.45);
  }
  .remind-card.due { border-color: var(--accent); animation: remind-pulse 1.6s ease-in-out infinite; }
  @keyframes remind-pulse { 0%,100% { box-shadow: 0 4px 16px rgba(0,0,0,.07); } 50% { box-shadow: 0 0 0 3px var(--accent-soft); } }
  .remind-label { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .remind-label::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .remind-card.done .remind-label::before { background: #3aaf6a; }
  .remind-text { font-size: 15.5px; font-weight: 600; color: var(--text); line-height: 1.45; margin-bottom: 10px; word-break: break-word; }
  .remind-count { display: flex; align-items: baseline; gap: 7px; margin-bottom: 9px; }
  .remind-count b { font-size: 27px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: .5px; }
  .remind-count span { font-size: 12px; color: var(--text-dim); }
  .remind-bar { height: 6px; border-radius: 999px; background: var(--accent-soft); overflow: hidden; margin-bottom: 12px; }
  .remind-bar > i { display: block; height: 100%; background: var(--accent); border-radius: 999px; transition: width 1s linear; }
  .remind-btns { display: flex; gap: 9px; }
  .remind-btns button {
    flex: 1; border: none; border-radius: 11px; padding: 11px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .remind-btns .rb-done { background: var(--control); color: var(--control-text); }
  .remind-btns .rb-cancel { flex: 0 0 auto; padding: 11px 18px; background: var(--bg-panel); color: var(--text-dim); border: 1px solid var(--border); }
  .remind-done-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .remind-done-row b { font-size: 18px; font-weight: 700; color: #3aaf6a; }
  .remind-done-row span { font-size: 12.5px; color: var(--text-dim); }
  .remind-foot { font-size: 11.5px; color: var(--text-dim); }

  /* Pinned reminder */
  #reminder-pin {
    position: fixed; right: 12px; top: calc(60px + env(safe-area-inset-top));
    z-index: 4; width: 208px; max-width: 56vw;
    display: flex; flex-direction: column; gap: 7px; pointer-events: none;
  }
  #reminder-pin:empty { display: none; }
  .pin-card {
    pointer-events: auto;
    background: var(--bg-soft); border: 1px solid var(--border);
    border-radius: 13px; padding: 9px 11px; box-shadow: 0 6px 20px rgba(0,0,0,.13);
    cursor: pointer; transition: transform .12s;
  }
  .pin-card:active { transform: scale(.97); }
  html[data-glass="1"] .pin-card {
    background: rgba(255,255,255,.42); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-color: rgba(255,255,255,.5);
  }
  .pin-card.due { border-color: var(--accent); animation: remind-pulse 1.6s ease-in-out infinite; }
  .pin-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .pin-top::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex: 0 0 auto; }
  .pin-text { font-size: 12px; color: var(--text); line-height: 1.3; font-weight: 500;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .pin-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .pin-count { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .pin-done {
    pointer-events: auto; flex: 0 0 auto;
    background: var(--control); color: var(--control-text); border: none; border-radius: 8px;
    padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .err-banner {
    max-width: 820px; margin: 0 auto 10px; background: var(--err-bg);
    border: 1px solid var(--danger); color: var(--err-text); padding: 8px 12px;
    border-radius: 8px; font-size: 13px;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg-panel); border: 1px solid var(--accent); color: var(--text);
    padding: 9px 16px; border-radius: 999px; font-size: 13px; z-index: 1005;
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s;
    box-shadow: 0 6px 24px rgba(0,0,0,.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Lock screen */
  #lock-screen {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: var(--bg); place-items: center;
  }
  #lock-screen.show { display: grid; }
  .lock-box { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px; }
  .lock-emoji { font-size: 46px; }
  .lock-title { font-size: 15px; color: var(--text-dim); }
  #lock-input {
    width: 180px; text-align: center; letter-spacing: 8px; font-size: 22px;
    background: var(--bg-panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 12px; outline: none;
  }
  #lock-input:focus { border-color: var(--accent); }
  .lock-err { color: var(--danger); font-size: 13px; min-height: 16px; }
  #lock-screen.shake .lock-box { animation: shake .35s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  /* Big editor */
  #editor-modal {
    display: none; position: fixed; inset: 0; z-index: 1001;
    background: rgba(0,0,0,.5); padding: env(safe-area-inset-top) 16px 16px;
    place-items: center;
  }
  #editor-modal.show { display: grid; }
  .editor-box {
    background: var(--bg-soft); border: 1px solid var(--border); border-radius: 14px;
    width: 100%; max-width: 720px; height: min(80vh, 640px);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .editor-head {
    display: flex; align-items: center; justify-content: space-between;

  }
  #editor-textarea {
    flex: 1; border: none; outline: none; resize: none; background: var(--bg-soft);
    color: var(--text); padding: 14px; font-size: 15px; line-height: 1.6; font-family: inherit;
  }

  /* Backdrop */
  .backdrop {
    display: none; position: fixed; inset: 0; z-index: 15;
    background: rgba(0,0,0,.45);
  }
  @media (max-width: 720px) {
    .sidebar {
      position: fixed; top: 0; bottom: 0; left: 0; z-index: 20;

    header h1 { font-size: 14px; }
    .model-quick { max-width: 120px; }
    .composer-hint { display: none; }

    .settings-nav { padding: 20px 14px calc(24px + env(safe-area-inset-bottom)); }
    .settings-inner { padding: 18px 14px calc(24px + env(safe-area-inset-bottom)); }
    .settings-shell.subpage .settings-inner { display: block; }

    .settings-page-intro h2 { font-size: 20px; }
    .starter-grid { grid-template-columns: 1fr; margin-top: 22px; }
    .empty-state { margin-top: clamp(90px, 17vh, 150px); }
    .empty-state .greet { font-size: 26px; }
  }
</style>
</head>
